name: Build Android APK Release

on:
  push:
    tags:
      - "v*"
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-android-apk:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.1"
          channel: stable
          cache: true

      - name: Show Flutter version
        run: flutter --version

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze project
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Run tests
        run: flutter test

      - name: Build release APK files
        run: flutter build apk --release --split-per-abi

      - name: Prepare release files
        id: release_files
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release

          if [ "${{ github.event_name }}" = "release" ]; then
            TAG_NAME="${{ github.event.release.tag_name }}"
          elif [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            TAG_NAME="${GITHUB_REF_NAME}"
          else
            TAG_NAME="manual-${GITHUB_RUN_NUMBER}"
          fi

          SAFE_TAG="${TAG_NAME//\//-}"
          echo "tag_name=${TAG_NAME}" >> "$GITHUB_OUTPUT"

          for apk in build/app/outputs/flutter-apk/*-release.apk; do
            base="$(basename "$apk")"
            abi="$base"
            abi="${abi#app-}"
            abi="${abi%-release.apk}"
            cp "$apk" "release/source-code-site-${SAFE_TAG}-${abi}.apk"
          done

          ls -lh release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: source-code-site-apk
          path: release/*.apk
          if-no-files-found: error

      - name: Upload APK files to GitHub Release
        if: github.event_name == 'release' || startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ steps.release_files.outputs.tag_name }}
        run: |
          set -euo pipefail
          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release upload "$TAG_NAME" release/*.apk --clobber
          else
            gh release create "$TAG_NAME" release/*.apk \
              --title "Source Code Site ${TAG_NAME}" \
              --notes "Android APK files generated automatically by GitHub Actions."
          fi
